services:
  # Postgres now comes from the shared ../../dev-services stack (one PostGIS on
  # the external `devnet` network). Start it with `make up` in ~/Repos/dev-services.
  # The backend connects to db `geotrees` on shared postgres:5432
  # (Host=localhost;Database=geotrees;Username=postgres;Password=postgres in
  # appsettings.json — already matches). Adminer is also provided by dev-services
  # (http://localhost:8080). Only Mailpit stays local to this project.
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped
